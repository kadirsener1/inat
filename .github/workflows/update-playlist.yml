name: IPTV M3U8 Otomatik Güncelleyici

on:
  schedule:
    - cron: "0 3,15 * * *"   # 06:00 ve 18:00 (UTC+3)
  workflow_dispatch:        # Manuel tetikleme
    inputs:
      channel:
        description: "Tek kanal adı (boş = tümü)"
        required: false
        default:  ""
      dry_run:
        description: "Dry run (true = dosyaya yazma)"
        required: false
        default:  "false"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Repo checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python kurulum
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Chrome kurulum
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Bağımlılıkları yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: M3U8 tara & güncelle
        run: |
          CHANNEL="${{ github.event.inputs.channel }}"
          DRY="${{ github.event.inputs.dry_run }}"

          CMD="python main.py"
          [ -n "$CHANNEL" ]    && CMD="$CMD --channel '$CHANNEL'"
          [ "$DRY" = "true" ]  && CMD="$CMD --dry-run"

          eval $CMD
        env:
          PYTHONUNBUFFERED: "1"
          TZ: "Europe/Istanbul"

      - name: Değişiklik var mı kontrol et
        id: check_changes
        run: |
          git diff --quiet playlist.m3u scraper.log 2>/dev/null \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true"  >> $GITHUB_OUTPUT

      - name: Commit & Push (değişiklik varsa)
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u scraper.log
          git commit -m "🔄 M3U güncellendi — $(date +'%Y-%m-%d %H:%M') UTC"
          git push

      - name: Özet yaz
        if: always()
        run: |
          echo "## 📡 Güncelleme Özeti" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Alan | Değer |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Kaynak | netspor.tecostream.xyz |" >> $GITHUB_STEP_SUMMARY
          echo "| Zaman | $(date +'%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Değişiklik | ${{ steps.check_changes.outputs.changed }} |" >> $GITHUB_STEP_SUMMARY
          if [ -f scraper.log ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Son Log Satırları" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -20 scraper.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
