name: IPTV Playlist Auto-Updater (8602741.xyz)

on:
  schedule:
    # Her 3 saatte bir çalışır (domain değişimini hızlı yakalar)
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      domain:
        description: "Manuel domain (örn: 9123456.xyz)"
        required: false
      dry_run:
        description: "Sadece test et (true/false)"
        required: false
        default: "false"
      channel:
        description: "Tek kanal test et"
        required: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Repo'yu Klonla
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🐍 Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Bağımlılıkları Kur
        run: |
          pip install -r requirements.txt

      - name: 🔍 Domain Kontrol + M3U Güncelle
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.domain }}" ]; then
            ARGS="$ARGS --domain ${{ github.event.inputs.domain }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.channel }}" ]; then
            ARGS="$ARGS --channel '${{ github.event.inputs.channel }}'"
          fi
          python main.py $ARGS

      - name: 📊 Sonuç Özeti
        if: always()
        run: |
          if [ -f update_result.json ]; then
            echo "## 📊 Güncelleme Özeti" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat update_result.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f state.json ]; then
            echo "## 🌐 Domain State" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat state.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🚀 Değişiklikleri Commit Et
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add playlist.m3u state.json update_result.json updater.log 2>/dev/null || true

          # Değişiklik var mı kontrol et
          if git diff --staged --quiet; then
            echo "✅ Değişiklik yok — commit atlanıyor"
            exit 0
          fi

          # state.json'dan domain bilgisini oku
          DOMAIN=$(python3 -c "import json; d=json.load(open('state.json')); print(d.get('current_domain','?'))" 2>/dev/null || echo "?")
          RESULT=$(python3 -c "
          import json
          r=json.load(open('update_result.json'))
          print(f\"U:{r['updated']} A:{r['added']} S:{r['unchanged']}\")
          " 2>/dev/null || echo "")

          git commit -m "🔄 IPTV güncellendi | Domain: $DOMAIN | $RESULT [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: 🔔 Domain Değişti Bildirimi
        if: success()
        run: |
          if [ -f update_result.json ]; then
            CHANGED=$(python3 -c "
          import json
          s=json.load(open('state.json'))
          hist=s.get('history',[])
          if hist:
              last=hist[-1]
              print(f\"⚠️ Domain değişti: {last['from']} → {last['to']}\")
          " 2>/dev/null || echo "")
            if [ -n "$CHANGED" ]; then
              echo "::warning::$CHANGED"
            fi
          fi
